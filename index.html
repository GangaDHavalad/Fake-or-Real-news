<!DOCTYPE html>
<html>

<head>
    <title>Fake News Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>🧠 Fake News Analyzer</h1>
        <p class="tagline">AI-powered detection with explanation</p>

        <form action="/predict" method="POST">
            <textarea name="news" placeholder="Paste your news article here..." required></textarea>
            <button type="submit">Analyze News</button>
        </form>

        {% if prediction %}
        <div class="result-card">

            <h2 class="{{ 'real' if 'Real' in prediction else 'fake' }}">
                {{ prediction }}
            </h2>

            <h3>🔍 Important Words</h3>

            <div class="word-box">
                {% for word, score in explanation %}
                <span class="chip">{{ word }}</span> {% endfor %}
            </div>

            <p class="summary">{{ summary }}</p>

        </div>
        {% endif %}

    </div>

</body>

</html>
